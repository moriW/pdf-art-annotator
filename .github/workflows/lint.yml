name: Node.js build

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5
            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: 'npm'
            - run: npm ci
            - run: npm run build --if-present
            - run: npm run test --if-present
