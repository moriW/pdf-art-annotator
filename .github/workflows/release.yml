name: Release Obsidian plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm test

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        run: |
          test -s manifest.json
          test -s main.js
          test -s styles.css
          node -e 'const manifest = require("./manifest.json"); const tag = process.env.RELEASE_TAG; if (manifest.version !== tag) { throw new Error(`manifest.json version ${manifest.version} does not match release tag ${tag}`); }'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "PDF Art Annotator $RELEASE_TAG" \
              --draft=false
          else
            gh release create "$RELEASE_TAG" \
              --title "PDF Art Annotator $RELEASE_TAG" \
              --notes "Automated release for PDF Art Annotator $RELEASE_TAG."
          fi

          gh release upload "$RELEASE_TAG" manifest.json main.js styles.css --clobber
